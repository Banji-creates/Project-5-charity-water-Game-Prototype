<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <p class="game-instructions">Choose a difficulty to change the target score, pace, and challenge level.</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <label class="difficulty-control" for="difficulty-select">
                Difficulty
                <select id="difficulty-select">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </label>
            <button id="start-btn">Start Game</button>
            <button id="reset-btn">Reset</button>
        </div>
        <div id="game-status" class="game-status" aria-live="polite">Press start to begin collecting points.</div>

        <div id="game-container">
        </div>

        <footer class="game-footer">
            <p>Support charity: water</p>
            <div class="footer-links">
                <a href="https://www.charitywater.org/" target="_blank" rel="noreferrer">Visit charity: water</a>
                <a href="https://www.charitywater.org/donate" target="_blank" rel="noreferrer">Donate</a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
